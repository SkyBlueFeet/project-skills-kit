name: Project Rules Check

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  rules-check:
    name: Validate project-rules governance
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: CLI help smoke check
        run: node ./src/cli.js --help

      - name: Run doctor (fail on error)
        run: node ./src/cli.js doctor --target=.

      - name: Check sync drift
        run: node ./src/cli.js sync --check --target=.
